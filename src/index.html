<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Portfólio</title>
    <link rel="stylesheet" href="./output.css"/>

<body class="font-main">

        <div class="flex flex-row items-center gap-4">
            <div class="size-12">
                <img src="./img/icon_logo.png" alt="Logo do site">
            </div>
            <h1 class="text-4xl">Portfólio</h1>
        </div>
        <div class="size-8">
            <img src="./img/icon_hamburguer.png" alt="">
        </div>
    </header>
    <!--HERO-->
    <section class="text-black px-6 py-16 bg-white">
        <div class="max-w-100 max-h-100">
            <img 
                src="./img/sally.png" 
                alt="Imagem da Sally, mascote da byron.solutions"

        </div>
        <div class="flex flex-col gap-12">
            <div class="text-center flex flex-col items-center gap-8">

                    <h2 class="text-5xl">Conheça a <span class="text-secondary">Sally</span></h2>

                        <p class="text-base">
                            Lorem ipsum dolor sit amet, consectetur adipisicing elit. Porro illum quisquam fugit reprehenderit quia quis modi maxime possimus aperiam laboriosam perferendis provident commodi expedita aliquam iste, dolore rem? Id, quo!

                </div>
                <button class="text-2xl font-semibold text-white bg-main px-4 py-2a rounded-2xl hover:bg-teal-600 transition duration-200">SAIBA MAIS!</button>
            </div>
            <div class="flex flex-row justify-between items-center">
                <p class="text-2xl">Nos contate!</p>
                <div class="flex flex-row gap-6">
                    <div class="size-12">
                        <a href="https://www.instagram.com/" target="_blank"><img src="./img/icon_instagram.png" alt=""></a>
                    </div>
                    <div class="size-12">
                        <a href="https://www.linkedin.com/in/matheus-junqueira-jundurian-bolonha-19157531b/" target="_blank"><img src="./img/icon_linkedin.png" alt=""></a>
                    </div>
                    <div class="size-12">
                        <a href=""><img src="./img/icon_whatsapp.png" alt=""></a>
                    </div>
                </div>
